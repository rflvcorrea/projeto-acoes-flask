<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análise de Ações 2025</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%); }
    .card-resumo { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .variacao-positiva { color: #198754; font-weight: 700; font-size: 1.4rem; }
    .variacao-negativa { color: #dc3545; font-weight: 700; font-size: 1.4rem; }
    .label-detalhe { font-size: 0.78rem; color: #6c757d; text-transform: uppercase; letter-spacing: 0.05em; }
    .valor-detalhe { font-size: 1rem; font-weight: 600; color: #212529; }
    .grafico-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h5.card-title { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold fs-4">📈 Análise de Ações — 2025</span>
    <span class="text-secondary small">Petrobras · Itaú · Vale</span>
  </div>
</nav>

<div class="container pb-5">

  <!-- Cards de Resumo -->
  <h5 class="mb-3 fw-bold text-secondary">Resumo do Ano</h5>
  <div class="row g-3 mb-4">
    {% for a in resumo %}
    <div class="col-md-4">
      <div class="card card-resumo p-3 h-100">
        <h5 class="card-title mb-1">{{ a.nome }}</h5>
        <div class="{% if a.positivo %}variacao-positiva{% else %}variacao-negativa{% endif %} mb-3">
          {{ a.variacao }}
        </div>
        <div class="row row-cols-2 g-2">
          <div class="col">
            <div class="label-detalhe">Abertura 2025</div>
            <div class="valor-detalhe">{{ a.inicial }}</div>
          </div>
          <div class="col">
            <div class="label-detalhe">Fechamento 2025</div>
            <div class="valor-detalhe">{{ a.final }}</div>
          </div>
          <div class="col">
            <div class="label-detalhe">Máxima</div>
            <div class="valor-detalhe text-success">{{ a.maxima }}</div>
          </div>
          <div class="col">
            <div class="label-detalhe">Mínima</div>
            <div class="valor-detalhe text-danger">{{ a.minima }}</div>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- Gráfico Histórico -->
  <div class="card grafico-card p-3 mb-4">
    {{ graf_hist | safe }}
  </div>

  <!-- Gráfico Retorno Comparativo -->
  <div class="card grafico-card p-3">
    {{ graf_ret | safe }}
  </div>

</div>

</body>
</html>
